        // TOOLBAR DRAGGING & FOLDING
        function setupToolbarDragging() {
            let isDraggingToolbar = false;
            let offsetLeft = 0, offsetTop = 0;

            dragHandle.addEventListener('mousedown', (e) => {
                isDraggingToolbar = true;
                offsetLeft = e.clientX - floatingToolbar.offsetLeft;
                offsetTop = e.clientY - floatingToolbar.offsetTop;
                dragHandle.classList.remove('cursor-grab');
                dragHandle.classList.add('cursor-grabbing');
            });

            document.addEventListener('mousemove', (e) => {
                if (isDraggingToolbar) {
                    let left = e.clientX - offsetLeft;
                    let top = e.clientY - offsetTop;
                    
                    left = Math.max(10, Math.min(window.innerWidth - floatingToolbar.offsetWidth - 10, left));
                    top = Math.max(10, Math.min(window.innerHeight - floatingToolbar.offsetHeight - 10, top));

                    floatingToolbar.style.left = left + 'px';
                    floatingToolbar.style.top = top + 'px';
                }
            });

            document.addEventListener('mouseup', () => {
                isDraggingToolbar = false;
                dragHandle.classList.remove('cursor-grabbing');
                dragHandle.classList.add('cursor-grab');
            });

            // Touch screen dragging fallback for ipad
            dragHandle.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    const t = e.touches[0];
                    isDraggingToolbar = true;
                    offsetLeft = t.clientX - floatingToolbar.offsetLeft;
                    offsetTop = t.clientY - floatingToolbar.offsetTop;
                }
            });

            dragHandle.addEventListener('touchmove', (e) => {
                if (isDraggingToolbar && e.touches.length === 1) {
                    const t = e.touches[0];
                    let left = t.clientX - offsetLeft;
                    let top = t.clientY - offsetTop;
                    left = Math.max(10, Math.min(window.innerWidth - floatingToolbar.offsetWidth - 10, left));
                    top = Math.max(10, Math.min(window.innerHeight - floatingToolbar.offsetHeight - 10, top));
                    floatingToolbar.style.left = left + 'px';
                    floatingToolbar.style.top = top + 'px';
                }
            });

            dragHandle.addEventListener('touchend', () => {
                isDraggingToolbar = false;
            });

            // Collapsing layout folding
            let isCollapsed = false;
            collapseBtn.addEventListener('click', () => {
                isCollapsed = !isCollapsed;
                if (isCollapsed) {
                    toolbarContent.classList.add('hidden');
                    collapseIcon.setAttribute('data-lucide', 'chevrons-right');
                    floatingToolbar.style.width = '50px';
                } else {
                    toolbarContent.classList.remove('hidden');
                    collapseIcon.setAttribute('data-lucide', 'chevrons-left');
                    floatingToolbar.style.width = 'auto';
                }
                lucide.createIcons();
            });
        }

            const pdfFileInput = document.getElementById('pdf-file-input');

            });

            pdfFileInput.addEventListener('change', (e) => {

                reader.onload = function () {

                    if (!state.tabs[classId]) state.tabs[classId] = [];

                    const newTab = {
                        id: 'tab-pdf-' + Date.now(),
                        title: file.name.substring(0, 15) + (file.name.length > 15 ? '...' : ''),
                        type: 'pdf',
                        pdfData: reader.result,
                        currentPage: 1,
                        totalPages: 1,
                        hasSideGrid: false
                    };

                    const loadingTask = pdfjsLib.getDocument({ data: atob(reader.result.split(',')[1]) });
                    loadingTask.promise.then(pdf => {
                        newTab.totalPages = pdf.numPages;
                        
                        // Immediately pre-cache PDF document instance for flawless instant rendering
                        loadedPdfDocs[newTab.id] = pdf;

                        state.tabs[classId].push(newTab);
                        state.currentTabId[classId] = newTab.id;
                        renderTabs();
                        showToast(`成功導入 PDF: ${pdf.numPages} 頁`);

                        console.error(err);
                        showToast("解析 PDF 失敗！");

                reader.readAsDataURL(file);

        // LASSO TOOL SELECTOR MECHANICS
        let lassoActive = false;
        let lassoPolygon = [];
        let selectedLassoObjects = [];
        let lassoTransformMode = null; // 'move', 'scale', 'rotate'
        let transformSnapshot = [];
        let transformCenter = { x: 0, y: 0 };
        let transformStartPt = { x: 0, y: 0 };
        let transformStartDist = 0;
        let transformStartAngle = 0;

        // 綁定套索的操作互動 (複製、剪下、指定貼上)
        function setupLassoInteractions() {
            document.getElementById('lasso-copy').addEventListener('click', copyLassoSelection);
            document.getElementById('lasso-cut').addEventListener('click', cutLassoSelection);
            document.getElementById('lasso-delete').addEventListener('click', deleteLassoSelection);
            
            // 綁定點擊貼上的觸發，不論是工具列還是選單，統一呼叫 armClickToPaste
            document.getElementById('lasso-trigger-paste').addEventListener('click', armClickToPaste);
            document.getElementById('lasso-paste').addEventListener('click', armClickToPaste);
            document.getElementById('tool-paste').addEventListener('click', armClickToPaste);
        }

        function startLasso(pt, e) {
            const cb = getCollectiveBoundingBox(selectedLassoObjects);

            if (cb) {
                const distScale = Math.hypot(pt.x - (cb.maxX + 6), pt.y - (cb.maxY + 6));
                if (distScale < 18) {
                    lassoTransformMode = 'scale';
                    initTransformData(pt, cb);
                    return;
                }

                const midX = (cb.minX + cb.maxX) / 2;
                const distRotate = Math.hypot(pt.x - midX, pt.y - (cb.minY - 24));
                if (distRotate < 18) {
                    lassoTransformMode = 'rotate';
                    initTransformData(pt, cb);
                    return;
                }

                if (pt.x >= cb.minX - 6 && pt.x <= cb.maxX + 6 && pt.y >= cb.minY - 6 && pt.y <= cb.maxY + 6) {
                    lassoTransformMode = 'move';
                    initTransformData(pt, cb);
                    return;
                }
            }

            lassoActive = true;
            lassoPolygon = [pt];
            selectedLassoObjects = [];
            lassoTransformMode = null;
            lassoMenu.classList.add('hidden');
            pasteMenu.classList.add('hidden');
        }

        function initTransformData(pt, cb) {
            pushUndoState(); // Store snapshot to Undo stack on drag start
            transformSnapshot = JSON.parse(JSON.stringify(selectedLassoObjects));
            transformCenter = {
                x: (cb.minX + cb.maxX) / 2,
                y: (cb.minY + cb.maxY) / 2
            };
            transformStartPt = pt;
            transformStartDist = Math.hypot(pt.x - transformCenter.x, pt.y - transformCenter.y);
            transformStartAngle = Math.atan2(pt.y - transformCenter.y, pt.x - transformCenter.x);
            lassoMenu.classList.add('hidden');
            pasteMenu.classList.add('hidden');
        }

        function dragLasso(pt, e) {
            if (lassoActive) {
                lassoPolygon.push(pt);
                redrawWorkspace();
            } else if (lassoTransformMode) {
                if (lassoTransformMode === 'scale') {
                    const currentDist = Math.hypot(pt.x - transformCenter.x, pt.y - transformCenter.y);
                    const s = transformStartDist > 0 ? currentDist / transformStartDist : 1;

                    selectedLassoObjects.forEach((obj, idx) => {
                        const snap = transformSnapshot[idx];
                        if (obj.type === 'stroke') {
                            obj.points = snap.points.map(p => ({
                                x: transformCenter.x + (p.x - transformCenter.x) * s,
                                y: transformCenter.y + (p.y - transformCenter.y) * s
                            }));
                            obj.size = Math.max(1, snap.size * s);
                        } else if (obj.type === 'stamp') {
                            obj.x = transformCenter.x + (snap.x - transformCenter.x) * s;
                            obj.y = transformCenter.y + (snap.y - transformCenter.y) * s;
                            obj.scaleSize = Math.max(15, snap.scaleSize * s);
                        } else if (obj.type === 'image') {
                            obj.x = transformCenter.x + (snap.x - transformCenter.x) * s;
                            obj.y = transformCenter.y + (snap.y - transformCenter.y) * s;
                            obj.width = Math.max(15, snap.width * s);
                            obj.height = Math.max(15, snap.height * s);
                        }
                    });
                } else if (lassoTransformMode === 'rotate') {
                    const currentAngle = Math.atan2(pt.y - transformCenter.y, pt.x - transformCenter.x);
                    const dAngle = currentAngle - transformStartAngle;
                    const cos = Math.cos(dAngle);
                    const sin = Math.sin(dAngle);

                    const rotatePoint = (px, py) => {
                        const dx = px - transformCenter.x;
                        const dy = py - transformCenter.y;
                        return {
                            x: transformCenter.x + dx * cos - dy * sin,
                            y: transformCenter.y + dx * sin + dy * cos
                        };
                    };

                    selectedLassoObjects.forEach((obj, idx) => {
                        const snap = transformSnapshot[idx];
                        if (obj.type === 'stroke') {
                            obj.points = snap.points.map(p => rotatePoint(p.x, p.y));
                        } else if (obj.type === 'stamp') {
                            const rot = rotatePoint(snap.x, snap.y);
                            obj.x = rot.x;
                            obj.y = rot.y;
                            obj.angle = (snap.angle || 0) + dAngle;
                        } else if (obj.type === 'image') {
                            const imgCenter = { x: snap.x + snap.width / 2, y: snap.y + snap.height / 2 };
                            const rot = rotatePoint(imgCenter.x, imgCenter.y);
                            obj.x = rot.x - obj.width / 2;
                            obj.y = rot.y - obj.height / 2;
                            obj.angle = (snap.angle || 0) + dAngle;
                        }
                    });
                } else if (lassoTransformMode === 'move') {
                    const dx = pt.x - transformStartPt.x;
                    const dy = pt.y - transformStartPt.y;

                    selectedLassoObjects.forEach((obj, idx) => {
                        const snap = transformSnapshot[idx];
                        if (obj.type === 'stroke') {
                            obj.points = snap.points.map(p => ({ x: p.x + dx, y: p.y + dy }));
                        } else if (obj.type === 'stamp' || obj.type === 'image') {
                            obj.x = snap.x + dx;
                            obj.y = snap.y + dy;
                        }
                    });
                }
                redrawWorkspace();
            }
        }

        // End of lasso dragging
        function endLasso() {
            if (lassoActive) {
                lassoActive = false;
                detectObjectsInsideLasso();
                lassoPolygon = [];
                redrawWorkspace();
            } else if (lassoTransformMode) {
                lassoTransformMode = null;
                transformSnapshot = [];
                saveState();
                showLassoMenu();
            }
        }

        // Raycasting algorithm to detect elements inside lasso drawn polygon
        function isPointInPolygon(point, polygon) {
            let x = point.x, y = point.y;
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                let xi = polygon[i].x, yi = polygon[i].y;
                let xj = polygon[j].x, yj = polygon[j].y;
                let intersect = ((yi > y) !== (yj > y))
                    && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function detectObjectsInsideLasso() {
            if (lassoPolygon.length < 3) return;

            const classId = state.currentClassId;
            const activeTabId = state.currentTabId[classId];
            const activeTab = state.tabs[classId].find(t => t.id === activeTabId);
            const key = `${classId}_${activeTabId}_${activeTab.currentPage}`;
            const objects = state.drawings[key] || [];

            selectedLassoObjects = objects.filter(obj => {
                const bounds = getObjectBoundingBox(obj);
                const center = {
                    x: (bounds.minX + bounds.maxX) / 2,
                    y: (bounds.minY + bounds.maxY) / 2
                };
                return isPointInPolygon(center, lassoPolygon);
            });

            if (selectedLassoObjects.length > 0) {
                showLassoMenu();
            } else {
                if (state.clipboard) {
                    showPasteMenu();
                }
            }
        }

        function showLassoMenu() {
            if (selectedLassoObjects.length === 0) return;
            const b = getCollectiveBoundingBox(selectedLassoObjects);
            if (!b) return;
            
            // Map virtual coords to client viewport coordinates
            const rect = drawingCanvas.getBoundingClientRect();
            const scaleX = rect.width / drawingCanvas.width;
            const scaleY = rect.height / drawingCanvas.height;

            const clientX = b.minX * scaleX + rect.left;
            const clientY = b.minY * scaleY + rect.top - 50;

            lassoMenu.style.left = Math.max(10, Math.min(window.innerWidth - 200, clientX)) + 'px';
            lassoMenu.style.top = Math.max(60, clientY) + 'px';
            lassoMenu.classList.remove('hidden');
        }

        // 貼上彈出選單
        function showPasteMenu() {
            const rect = drawingCanvas.getBoundingClientRect();
            pasteMenu.style.left = (window.innerWidth / 2 - 50) + 'px';
            pasteMenu.style.top = (window.innerHeight / 2 - 20) + 'px';
            pasteMenu.classList.remove('hidden');
        }

        // CLIPBOARD OPERATIONS
        function copyLassoSelection() {
            if (selectedLassoObjects.length === 0) return;
            state.clipboard = JSON.parse(JSON.stringify(selectedLassoObjects));
            showToast("已成功複製圈選物件！點選工具列的『貼上』並在想要的地方點擊即可貼上。");
            lassoMenu.classList.add('hidden');
        }

        // 剪下套索選取的物件
        function cutLassoSelection() {
            if (selectedLassoObjects.length === 0) return;
            state.clipboard = JSON.parse(JSON.stringify(selectedLassoObjects));
            deleteLassoSelection();
            showToast("已成功剪下物件！點選工具列的『貼上』並在想要的地方點擊即可貼上。");
            lassoMenu.classList.add('hidden');
        }

        function deleteLassoSelection() {
            if (selectedLassoObjects.length === 0) return;
            pushUndoState();

            const classId = state.currentClassId;
            const activeTabId = state.currentTabId[classId];
            const activeTab = state.tabs[classId].find(t => t.id === activeTabId);
            const key = `${classId}_${activeTabId}_${activeTab.currentPage}`;

            state.drawings[key] = state.drawings[key].filter(obj => !selectedLassoObjects.includes(obj));

        // 啟動指定點擊貼上模式
        function armClickToPaste() {
            if (!state.clipboard || state.clipboard.length === 0) {
                showToast("剪貼簿目前沒有內容！請先進行圈選複製、剪下或擷圖。");
                return;
            }
            state.pendingPasteClick = true;
            lassoMenu.classList.add('hidden');
            pasteMenu.classList.add('hidden');
            
            // 自動切換到套索工具以便操作
            setActiveTool('lasso', 'tool-lasso');

        // 執行在指定點選位置貼上
        function executeDesignatedPaste(pt) {
            state.pendingPasteClick = false;
            hideInteractionBanner();

            const classId = state.currentClassId;
            const activeTabId = state.currentTabId[classId];
            const activeTab = state.tabs[classId].find(t => t.id === activeTabId);
            const key = `${classId}_${activeTabId}_${activeTab.currentPage}`;

            pushUndoState();
            if (!state.drawings[key]) state.drawings[key] = [];

            // 計算剪貼簿中所有物件的聯合邊界框中心
            const cb = getCollectiveBoundingBox(state.clipboard);
            if (!cb) {
                showToast("貼上失敗：貼上對象的範圍不合法。");
                return;
            }

            const clipCenter = {
                x: (cb.minX + cb.maxX) / 2,
                y: (cb.minY + cb.maxY) / 2
            };

            // 計算目標點與中心的 delta 偏移量
            const dx = pt.x - clipCenter.x;
            const dy = pt.y - clipCenter.y;

            // 生成偏移後的物件複本
            const pastedCopies = state.clipboard.map(obj => {
                const copy = JSON.parse(JSON.stringify(obj));
                copy.id = (copy.type) + '-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4);
                
                if (copy.type === 'stroke') {
                    copy.points = copy.points.map(p => ({ x: p.x + dx, y: p.y + dy }));
                } else if (copy.type === 'stamp' || copy.type === 'image') {
                    copy.x += dx;
                    copy.y += dy;
                }
                return copy;
            });

            // 加到畫布繪圖陣列中
            pastedCopies.forEach(c => state.drawings[key].push(c));
            
            // 自動圈選貼上的物件，方便立即微調縮放旋轉
            selectedLassoObjects = pastedCopies; 

            saveState();
            redrawWorkspace();
            showLassoMenu(); // 在新貼上的物件旁顯示套索功能選單
            showToast(`已成功貼上 ${pastedCopies.length} 個物件！`);
        }

        // 剪裁擷圖處理程序
        async function executeCropCapture() {
            hideInteractionBanner();
            if (!cropStartPt || !cropCurrentPt) return;

            const left = Math.min(cropStartPt.x, cropCurrentPt.x);
            const top = Math.min(cropStartPt.y, cropCurrentPt.y);
            const width = Math.abs(cropStartPt.x - cropCurrentPt.x);
            const height = Math.abs(cropStartPt.y - cropCurrentPt.y);

            // Cancel if area is tiny
            if (width < 10 || height < 10) {
                showToast("擷選區域過小，已取消剪裁。");
                redrawWorkspace();
                return;
            }

            const classId = state.currentClassId;
            const activeTabId = state.currentTabId[classId];
            if (!activeTabId) return;
            const activeTab = state.tabs[classId].find(t => t.id === activeTabId);

            // 1. 建立背景獨立的 Canvas 渲染器
            const snapshotCanvas = document.createElement('canvas');
            snapshotCanvas.width = drawingCanvas.width;
            snapshotCanvas.height = drawingCanvas.height;
            const sCtx = snapshotCanvas.getContext('2d');

            // 2. 繪製乾淨的底圖，完全排除擷取框與套索變形框
            if (activeTab.type === 'pdf') {
                sCtx.drawImage(pdfCanvas, 0, 0);
            } else {
                sCtx.fillStyle = '#fcfcfc';
                sCtx.fillRect(0, 0, snapshotCanvas.width, snapshotCanvas.height);
                
                sCtx.strokeStyle = 'rgba(200, 200, 200, 0.2)';
                sCtx.lineWidth = 1;
                const gridSize = 40;
                for (let x = 0; x < snapshotCanvas.width; x += gridSize) {
                    sCtx.beginPath();
                    sCtx.moveTo(x, 0);
                    sCtx.lineTo(x, snapshotCanvas.height);
                    sCtx.stroke();
                }
                for (let y = 0; y < snapshotCanvas.height; y += gridSize) {
                    sCtx.beginPath();
                    sCtx.moveTo(0, y);
                    sCtx.lineTo(snapshotCanvas.width, y);
                    sCtx.stroke();
                }
            }

            // 3. 只繪製純淨的手寫、印章與圖片物件
            const key = `${classId}_${activeTabId}_${activeTab.currentPage}`;
            const objects = state.drawings[key] || [];
            objects.forEach(obj => {
                if (obj.type === 'stroke') {
                    drawStroke(obj, sCtx);
                } else if (obj.type === 'stamp') {
                    drawChemicalStamp(obj, sCtx);
                } else if (obj.type === 'image') {
                    drawImageObject(obj, sCtx);
                }
            });

            // 4. 裁剪該矩形區域
            const croppedCanvas = document.createElement('canvas');
            croppedCanvas.width = width;
            croppedCanvas.height = height;
            const cCtx = croppedCanvas.getContext('2d');
            cCtx.drawImage(snapshotCanvas, left, top, width, height, 0, 0, width, height);

            // 5. 存入全域剪貼簿
            const croppedDataUrl = croppedCanvas.toDataURL('image/png');
            state.clipboard = [{
                id: 'image-' + Date.now(),
                type: 'image',
                dataUrl: croppedDataUrl,
                x: 0,
                y: 0,
                width: width,
                height: height,
                angle: 0
            }];

            showToast("畫面裁剪擷圖複製完成！您可以點選工具列的『貼上』並在想要的位置點擊貼上。");
            
            // 恢復白板渲染並重新繪製
            redrawWorkspace();
        }

        // SIDE-BY-SIDE GRID PAPER INTERACTION MANAGER
        function setupSideGridInteractions() {
            toggleSideGridBtn.addEventListener('click', () => {
                const classId = state.currentClassId;
                const activeTabId = state.currentTabId[classId];
                if (!activeTabId) return;
                
                const activeTab = state.tabs[classId].find(t => t.id === activeTabId);
                if (activeTab && activeTab.type === 'pdf') {
                    pushUndoState();
                    activeTab.hasSideGrid = !activeTab.hasSideGrid;
                    saveState();
                    loadActiveTabContent();
                    showToast(activeTab.hasSideGrid ? "已開啟右側並排方格對照區！您現在可以一邊看講義一邊寫筆記。" : "並排方格紙已關閉。");
                }
            });
        }

        // PNG EXPORTS FOR STUDENTS
        document.getElementById('export-png-btn').addEventListener('click', () => {
            const classId = state.currentClassId;
            const activeTabId = state.currentTabId[classId];
            if (!activeTabId) return;

            const tabs = state.tabs[classId] || [];
            const activeTab = tabs.find(t => t.id === activeTabId);

            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = drawingCanvas.width;
            exportCanvas.height = drawingCanvas.height;
            const eCtx = exportCanvas.getContext('2d');

            if (activeTab.type === 'pdf') {
                eCtx.drawImage(pdfCanvas, 0, 0);
                
                // If has side-by-side grid, manually render grid lines for the side write paper inside export
                if (activeTab.hasSideGrid) {
                    const sideGridWidth = 800;
                    const pdfWidth = pdfCanvas.width;
                    
                    eCtx.fillStyle = '#fcfcfc';
                    eCtx.fillRect(pdfWidth, 0, sideGridWidth, exportCanvas.height);
                    
                    eCtx.strokeStyle = 'rgba(200, 200, 200, 0.2)';
                    eCtx.lineWidth = 1;
                    const gridSize = 40;
                    for (let x = pdfWidth; x < exportCanvas.width; x += gridSize) {
                        eCtx.beginPath();
                        eCtx.moveTo(x, 0);
                        eCtx.lineTo(x, exportCanvas.height);
                        eCtx.stroke();
                    }
                    for (let y = 0; y < exportCanvas.height; y += gridSize) {
                        eCtx.beginPath();
                        eCtx.moveTo(pdfWidth, y);
                        eCtx.lineTo(exportCanvas.width, y);
                        eCtx.stroke();
                    }
                    
                    // Separator bold line
                    eCtx.strokeStyle = '#cbd5e1';
                    eCtx.lineWidth = 3;
                    eCtx.beginPath();
                    eCtx.moveTo(pdfWidth, 0);
                    eCtx.lineTo(pdfWidth, exportCanvas.height);
                    eCtx.stroke();
                }
            } else {
                eCtx.fillStyle = '#fcfcfc';
                eCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
                
                eCtx.strokeStyle = 'rgba(200, 200, 200, 0.2)';
                eCtx.lineWidth = 1;
                const gridSize = 40;
                for (let x = 0; x < exportCanvas.width; x += gridSize) {
                    eCtx.beginPath();
                    eCtx.moveTo(x, 0);
                    eCtx.lineTo(x, exportCanvas.height);
                    eCtx.stroke();
                }
                for (let y = 0; y < exportCanvas.height; y += gridSize) {
                    eCtx.beginPath();
                    eCtx.moveTo(0, y);
                    eCtx.lineTo(exportCanvas.width, y);
                    eCtx.stroke();
                }
            }

            eCtx.drawImage(drawingCanvas, 0, 0);

            // 防禦性讀取，避免 TypeError 發生
            const currentClass = state.classes.find(c => c.id === classId);
            const className = currentClass ? currentClass.name : '未命名班級';

            const link = document.createElement('a');
            link.download = `${className}_${activeTab.title}_頁碼${activeTab.currentPage}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
            showToast("PNG 圖檔導出成功！已包含完整的講義與右側書寫筆記。");
        });

        // CLASS SETTINGS MODAL MECHANICS
        const classModal = document.getElementById('class-modal');
        const classListContainer = document.getElementById('class-list-container');
        const newClassInput = document.getElementById('new-class-input');

        function setupClassModal() {
            document.getElementById('add-class-btn').addEventListener('click', openClassModal);
            document.getElementById('edit-class-btn').addEventListener('click', openClassModal);
            document.getElementById('close-modal-btn').addEventListener('click', () => classModal.classList.add('hidden'));

            document.getElementById('modal-add-class-btn').addEventListener('click', () => {
                const name = newClassInput.value.trim();
                if (!name) return;

                const newClass = {
                    id: 'class-' + Date.now(),
                    name: name
                };
                state.classes.push(newClass);
                newClassInput.value = '';
                
                renderClassSelect();
                renderModalClassList();
                saveState();
                showToast(`已新增 ${name}`);
            });
        }

        function openClassModal() {
            classModal.classList.remove('hidden');
            renderModalClassList();
        }

        function renderModalClassList() {
            classListContainer.innerHTML = '';
            state.classes.forEach(c => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-2 bg-white rounded-lg border border-slate-200 shadow-xs mb-1';

                const nameSpan = document.createElement('span');
                nameSpan.className = 'font-semibold text-slate-700 text-sm';
                nameSpan.textContent = c.name;
                div.appendChild(nameSpan);

                const actions = document.createElement('div');
                actions.className = 'flex items-center space-x-1';

                // Rename Button
                const renBtn = document.createElement('button');
                renBtn.className = 'p-1 text-slate-400 hover:text-indigo-600 rounded transition';
                renBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>';
                renBtn.addEventListener('click', () => {
                    const newName = prompt("請輸入新的班級名稱:", c.name);
                    if (newName && newName.trim()) {
                        c.name = newName.trim();
                        renderClassSelect();
                        renderModalClassList();
                        saveState();
                        showToast("名稱已變更");
                    }
                });
                actions.appendChild(renBtn);

                // Delete Button
                const delBtn = document.createElement('button');
                delBtn.className = 'p-1 text-slate-400 hover:text-red-600 rounded transition';
                delBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>';
                delBtn.addEventListener('click', () => {
                    if (state.classes.length <= 1) {
                        showToast("必須保留至少一個班級");
                        return;
                    }
                    if (confirm(`確定要刪除班級「${c.name}」嗎？所有內容都將抹除且無法還原！`)) {
                        state.classes = state.classes.filter(item => item.id !== c.id);
                        delete state.tabs[c.id];
                        delete state.currentTabId[c.id];

                        if (state.currentClassId === c.id) {
                            state.currentClassId = state.classes[0].id;
                        }

                        renderClassSelect();
                        renderModalClassList();
                        switchClass(state.currentClassId);
                        saveState();
                        showToast("班級已刪除");
                    }
                });
                actions.appendChild(delBtn);

                div.appendChild(actions);
                classListContainer.appendChild(div);
            });
        }
    </script>
</body>
